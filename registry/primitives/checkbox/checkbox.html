<!-- @ui:kind primitive -->

<!-- @ui:variants size=sm|md|lg -->

<!-- Default (unchecked) -->
<label data-ui="checkbox-label">
  <input data-ui="checkbox" type="checkbox" id="terms">
  <span data-part="label">Accept terms and conditions</span>
</label>

<!-- Checked -->
<label data-ui="checkbox-label">
  <input data-ui="checkbox" type="checkbox" id="newsletter" checked>
  <span data-part="label">Subscribe to newsletter</span>
</label>

<!-- Disabled unchecked -->
<label data-ui="checkbox-label">
  <input data-ui="checkbox" type="checkbox" id="readonly-off" disabled>
  <span data-part="label">Disabled option</span>
</label>

<!-- Disabled checked -->
<label data-ui="checkbox-label">
  <input data-ui="checkbox" type="checkbox" id="readonly-on" disabled checked>
  <span data-part="label">Locked selection</span>
</label>

<!-- Indeterminate (set via JS: el.indeterminate = true) -->
<label data-ui="checkbox-label">
  <input data-ui="checkbox" type="checkbox" id="select-all" data-state="indeterminate">
  <span data-part="label">Select all</span>
</label>

<!-- Sizes -->
<label data-ui="checkbox-label">
  <input data-ui="checkbox" data-size="sm" type="checkbox">
  <span data-part="label">Small</span>
</label>

<label data-ui="checkbox-label">
  <input data-ui="checkbox" type="checkbox">
  <span data-part="label">Medium (default)</span>
</label>

<label data-ui="checkbox-label">
  <input data-ui="checkbox" data-size="lg" type="checkbox">
  <span data-part="label">Large</span>
</label>
