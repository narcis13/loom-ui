<!-- @ui:component switch -->
<!-- @ui:kind primitive -->
<!-- @ui:slots label -->
<!-- @ui:variants size=sm|md|lg -->

<!-- Off (default) -->
<label data-ui="switch-label">
  <button data-ui="switch" role="switch" aria-checked="false">
    <span data-part="thumb"></span>
  </button>
  <span data-part="label">Dark mode</span>
</label>

<!-- On -->
<label data-ui="switch-label">
  <button data-ui="switch" role="switch" aria-checked="true" data-state="on">
    <span data-part="thumb"></span>
  </button>
  <span data-part="label">Notifications enabled</span>
</label>

<!-- Disabled off -->
<label data-ui="switch-label">
  <button data-ui="switch" role="switch" aria-checked="false" disabled>
    <span data-part="thumb"></span>
  </button>
  <span data-part="label">Feature locked</span>
</label>

<!-- Disabled on -->
<label data-ui="switch-label">
  <button data-ui="switch" role="switch" aria-checked="true" data-state="on" disabled>
    <span data-part="thumb"></span>
  </button>
  <span data-part="label">Always active</span>
</label>

<!-- Sizes -->
<label data-ui="switch-label">
  <button data-ui="switch" data-size="sm" role="switch" aria-checked="true" data-state="on">
    <span data-part="thumb"></span>
  </button>
  <span data-part="label">Small</span>
</label>

<label data-ui="switch-label">
  <button data-ui="switch" role="switch" aria-checked="true" data-state="on">
    <span data-part="thumb"></span>
  </button>
  <span data-part="label">Medium (default)</span>
</label>

<label data-ui="switch-label">
  <button data-ui="switch" data-size="lg" role="switch" aria-checked="true" data-state="on">
    <span data-part="thumb"></span>
  </button>
  <span data-part="label">Large</span>
</label>
