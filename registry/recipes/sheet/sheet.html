<!-- Default (bottom, medium) -->
<div data-ui="sheet" data-state="closed" id="demo-sheet">
  <button data-part="trigger">Open Sheet</button>

  <div data-part="overlay" hidden></div>

  <div
    data-part="panel"
    data-variant="bottom"
    data-size="md"
    role="dialog"
    aria-modal="true"
    aria-labelledby="demo-sheet-title"
    hidden
  >
    <div data-part="header">
      <h2 id="demo-sheet-title" data-part="title">Sheet Title</h2>
      <button data-part="close" aria-label="Close sheet">&#x2715;</button>
    </div>
    <div data-part="body">
      <p>This is a bottom sheet. It slides up from the bottom of the screen.</p>
    </div>
  </div>
</div>
