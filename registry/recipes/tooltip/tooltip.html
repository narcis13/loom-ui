<!-- Top position (default) -->
<div data-ui="tooltip" data-variant="top" data-state="hidden">
  <button data-part="trigger" aria-describedby="tooltip-top-content">Hover me (top)</button>
  <div data-part="content" id="tooltip-top-content" role="tooltip" hidden>
    This is a tooltip on top
  </div>
</div>
