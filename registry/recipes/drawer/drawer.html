<!-- Default (left, medium) -->
<div data-ui="drawer" data-state="closed" id="demo-drawer">
  <button data-part="trigger">Open Drawer</button>

  <div data-part="overlay" hidden></div>

  <div
    data-part="panel"
    data-variant="left"
    data-size="md"
    role="dialog"
    aria-modal="true"
    aria-labelledby="demo-drawer-title"
    hidden
  >
    <div data-part="header">
      <h2 id="demo-drawer-title" data-part="title">Drawer Title</h2>
      <button data-part="close" aria-label="Close drawer">&#x2715;</button>
    </div>
    <div data-part="body">
      <p>This is the drawer body content.</p>
    </div>
    <div data-part="footer">
      <button data-ui="button" data-part="close" data-variant="outline">Cancel</button>
      <button data-ui="button" data-variant="primary">Save</button>
    </div>
  </div>
</div>
