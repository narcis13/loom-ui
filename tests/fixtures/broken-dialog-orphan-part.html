<!DOCTYPE html>
<html lang="en">
<head><title>Broken Dialog — Orphan Part</title></head>
<body>

<!-- Dialog with unknown data-part="sidebar" (not in manifest) -->
<div data-ui="dialog" data-state="closed" id="orphan-part-dialog">
  <button data-part="trigger">Open</button>
  <div data-part="overlay" hidden></div>
  <div
    data-part="panel"
    data-size="md"
    role="dialog"
    aria-modal="true"
    aria-labelledby="orphan-part-dialog-title"
    hidden
  >
    <div data-part="header">
      <h2 id="orphan-part-dialog-title" data-part="title">Title</h2>
      <button data-part="close" aria-label="Close dialog">&#x2715;</button>
    </div>
    <div data-part="sidebar">This is an unknown slot</div>
    <div data-part="body"><p>Content</p></div>
    <div data-part="footer">
      <button data-ui="button" data-variant="primary">OK</button>
    </div>
  </div>
</div>

<script type="module" src="ui/core/loom.js"></script>
</body>
</html>
