<!-- @ui:component auth-form -->
<!-- @ui:kind pattern -->

<section data-ui="auth-form" aria-labelledby="auth-form-title">
  <article data-ui="card" data-part="panel">
    <div data-part="body">
      <div data-part="header">
        <p data-part="eyebrow">Workspace access</p>
        <h1 id="auth-form-title" data-part="title">Sign in to Loom</h1>
        <p data-part="description">Use your team credentials to continue to the dashboard.</p>
      </div>

      <form data-part="form">
        <div data-part="field">
          <label data-ui="label" for="auth-email">Email</label>
          <input
            data-ui="input"
            id="auth-email"
            type="email"
            data-size="md"
            placeholder="team@loom.dev"
          />
        </div>

        <div data-part="field">
          <label data-ui="label" for="auth-password">Password</label>
          <input
            data-ui="input"
            id="auth-password"
            type="password"
            data-size="md"
            placeholder="Enter your password"
          />
        </div>

        <div data-part="meta">
          <label data-ui="label" for="auth-remember">Remember me</label>
          <button data-ui="button" data-variant="link" data-size="sm" type="button">
            Forgot password?
          </button>
        </div>

        <div data-part="actions">
          <button data-ui="button" data-variant="primary" data-size="md" type="submit">
            Sign in
          </button>
          <div data-ui="separator" aria-hidden="true"></div>
          <button data-ui="button" data-variant="outline" data-size="md" type="button">
            Continue with SSO
          </button>
        </div>
      </form>

      <p data-part="footer">
        Need an invite?
        <a data-part="link" href="/">Request access</a>
      </p>
    </div>
  </article>
</section>
