<!-- @ui:component sheet -->
<div data-ui="sheet" data-state="closed" id="sheet-demo">
  <button data-ui="button" data-part="trigger" type="button">Open mobile sheet</button>
  <div data-part="overlay" hidden></div>
  <section data-part="panel" data-edge="bottom" role="dialog" aria-modal="true" aria-labelledby="sheet-demo-title" hidden tabindex="-1">
    <h2 id="sheet-demo-title" data-part="title">Quick actions</h2>
    <div data-part="body">Use this sheet for mobile-first flows and secondary actions.</div>
    <button data-part="close" type="button" aria-label="Close sheet">Close</button>
  </section>
</div>
