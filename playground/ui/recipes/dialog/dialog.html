<!-- @ui:component dialog -->

<div data-ui="dialog" data-state="closed" id="dialog-demo">
  <button data-ui="button" data-part="trigger" data-variant="primary" type="button">
    Open dialog
  </button>

  <div data-part="overlay" hidden></div>

  <div
    data-part="panel"
    id="dialog-demo-panel"
    role="dialog"
    aria-modal="true"
    aria-labelledby="dialog-demo-title"
    aria-describedby="dialog-demo-description"
    data-size="md"
    hidden
    tabindex="-1"
  >
    <div data-part="header">
      <div>
        <h2 id="dialog-demo-title" data-part="title">Review changes</h2>
        <p id="dialog-demo-description" data-part="description">
          Confirm before publishing this update.
        </p>
      </div>
      <button data-part="close" type="button" aria-label="Close dialog">Close</button>
    </div>

    <div data-part="body">
      <p>Content inside the dialog can include forms, warnings, or actions.</p>
    </div>

    <div data-part="footer">
      <button
        data-ui="button"
        data-part="close"
        data-variant="secondary"
        type="button"
        aria-label="Close dialog"
      >
        Cancel
      </button>
      <button data-ui="button" data-variant="primary" type="button">
        Continue
      </button>
    </div>
  </div>
</div>
