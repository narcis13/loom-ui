<!-- @ui:component toast -->
<div data-ui="toast" data-state="ready" aria-live="polite">
  <section data-part="item" data-state="open" data-duration="4000">
    <div>
      <strong data-part="title">Changes saved</strong>
      <p data-part="description">Your workspace defaults are now live.</p>
    </div>
    <button data-part="close" type="button" aria-label="Dismiss notification">Close</button>
  </section>
</div>
